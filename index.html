<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MATH - 수학 과외</title>
  <style>
    :root {
      --bg: #f0f2f5;
      --card: #ffffff;
      --dark: #222831;
      --gray: #393E46;
      --light-text: #6b7280;
      --border: #e5e7eb;
      --accent1: #FFD369;
      --accent2: #77B5FE;
      --success: #16a34a;
      --warning: #d97706;
      --danger: #dc2626;
      --orange: #ea580c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── 헤더 ── */
    .header {
      background: var(--dark);
      padding: 24px 20px 18px;
      text-align: center;
    }
    .header h1 {
      color: var(--accent1);
      font-size: 26px;
      letter-spacing: 4px;
      font-weight: 800;
    }
    .header p {
      color: #9ca3af;
      font-size: 12px;
      margin-top: 4px;
    }

    /* ── 탭 네비게이션 ── */
    .tab-nav {
      display: flex;
      background: var(--gray);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .tab-btn {
      flex: 1;
      padding: 13px 4px;
      text-align: center;
      color: #9ca3af;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: transparent;
      transition: all 0.2s;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
    }
    .tab-btn.active {
      color: white;
      border-bottom-color: var(--accent1);
    }

    /* ── 공통 ── */
    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--light-text);
      letter-spacing: 1px;
      padding: 20px 20px 8px;
    }
    .card {
      background: var(--card);
      border-radius: 14px;
      margin: 0 16px 12px;
      padding: 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .tab-content { display: none; padding-bottom: 20px; }
    .tab-content.active { display: block; }

    /* ══════════════════════════════════════
       공유 진도 카드
       ══════════════════════════════════════ */
    .shared-progress {
      position: relative;
    }
    .shared-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .shared-label {
      font-size: 16px;
      font-weight: 700;
    }
    .shared-months {
      background: var(--dark);
      color: var(--accent1);
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 12px;
    }
    .progress-bar-wrap {
      background: var(--bg);
      border-radius: 8px;
      height: 12px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 8px;
      transition: width 0.6s ease;
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
    }
    .progress-hours {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 13px;
    }
    .progress-hours .hours-text {
      font-weight: 700;
    }
    .progress-hours .pct-text {
      color: var(--light-text);
    }
    .student-counts {
      display: flex;
      gap: 12px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .student-count-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
    }
    .student-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    /* ══════════════════════════════════════
       스케줄 미니 카드
       ══════════════════════════════════════ */
    .schedule-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 0 16px;
    }
    .schedule-card {
      background: var(--card);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      border-top: 3px solid var(--border);
    }
    .schedule-card .sch-name {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 2px;
    }
    .schedule-card .sch-grade {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      display: inline-block;
      margin-bottom: 8px;
    }
    .schedule-card .sch-day {
      font-size: 13px;
      color: var(--light-text);
    }
    .schedule-card .sch-next {
      font-size: 12px;
      font-weight: 600;
      color: var(--dark);
      margin-top: 6px;
    }

    /* ══════════════════════════════════════
       시험 D-day
       ══════════════════════════════════════ */
    .exam-cards {
      display: flex;
      gap: 10px;
      padding: 0 16px;
      overflow-x: auto;
    }
    .exam-chip {
      flex-shrink: 0;
      background: var(--dark);
      color: white;
      border-radius: 12px;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .exam-dday {
      font-size: 22px;
      font-weight: 800;
      color: var(--accent1);
    }
    .exam-info {
      font-size: 12px;
      line-height: 1.4;
    }
    .exam-info .exam-name {
      font-weight: 600;
    }

    /* ══════════════════════════════════════
       캘린더
       ══════════════════════════════════════ */
    .cal-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .cal-nav button {
      background: var(--bg);
      border: none;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
      color: var(--dark);
      font-weight: 700;
    }
    .cal-nav button:active { background: var(--border); }
    .cal-month { font-size: 16px; font-weight: 700; }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      text-align: center;
    }
    .cal-header {
      font-size: 11px;
      font-weight: 600;
      color: var(--light-text);
      padding: 6px 0;
    }
    .cal-header:first-child { color: #ef4444; }
    .cal-header:last-child { color: #3b82f6; }
    .cal-cell {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      font-size: 13px;
      min-height: 44px;
    }
    .cal-cell.today {
      background: var(--dark);
      color: white;
      font-weight: 700;
    }
    .cal-cell.sunday { color: #ef4444; }
    .cal-cell.saturday { color: #3b82f6; }
    .cal-dots { display: flex; gap: 3px; margin-top: 2px; height: 5px; }
    .cal-dot { width: 5px; height: 5px; border-radius: 50%; }
    .cal-dot.future { opacity: 0.3; }
    .cal-cell.next-session {
      position: relative;
    }
    .cal-next-tags {
      display: flex;
      gap: 2px;
      justify-content: center;
      margin-top: 1px;
      height: 10px;
    }
    .cal-next-tag {
      font-size: 7px;
      font-weight: 700;
      padding: 1px 4px;
      border-radius: 3px;
      color: white;
      white-space: nowrap;
      line-height: 10px;
    }
    .cal-legend {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 14px;
      font-size: 11px;
      color: var(--light-text);
    }
    .cal-legend-item { display: flex; align-items: center; gap: 5px; }
    .cal-legend-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* ══════════════════════════════════════
       수업 기록 카드
       ══════════════════════════════════════ */
    .session-card { border-left: 4px solid var(--border); }
    .session-card.latest { border-left-color: var(--accent1); }
    .session-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .session-header:active { opacity: 0.7; }
    .session-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }
    .session-num {
      background: var(--dark);
      color: var(--accent1);
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .session-meta { min-width: 0; }
    .session-topic {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-date {
      font-size: 12px;
      color: var(--light-text);
      margin-top: 1px;
    }
    .session-arrow {
      font-size: 12px;
      color: var(--light-text);
      transition: transform 0.2s;
      flex-shrink: 0;
      margin-left: 8px;
    }
    .session-card.open .session-arrow { transform: rotate(180deg); }
    .session-detail {
      display: none;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .session-card.open .session-detail { display: block; }

    .detail-section { margin-bottom: 14px; }
    .detail-section:last-child { margin-bottom: 0; }
    .detail-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--light-text);
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .detail-text { font-size: 14px; line-height: 1.6; }

    /* 숙제 */
    .homework-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .homework-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 10px;
      flex-shrink: 0;
    }
    .homework-badge.done { background: #dcfce7; color: var(--success); }
    .homework-badge.partial { background: #fef3c7; color: var(--warning); }
    .homework-badge.wrong { background: #ffedd5; color: var(--orange); }
    .homework-badge.not_done { background: #f3f4f6; color: #6b7280; }
    .homework-note {
      margin-top: 6px;
      padding: 8px 12px;
      background: #f8f9fa;
      border-radius: 8px;
      font-size: 13px;
      color: var(--gray);
      border-left: 3px solid var(--border);
    }
    .homework-note.partial { border-left-color: var(--warning); }
    .homework-note.wrong { border-left-color: var(--orange); }

    /* 피드백 (학부모 전용) */
    .feedback-box {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.7;
      color: var(--gray);
      border-left: 3px solid var(--accent1);
    }

    /* 이해도 */
    .understanding { display: flex; align-items: center; gap: 3px; }
    .star { font-size: 16px; color: var(--border); }
    .star.filled { color: var(--accent1); }

    /* 다음 예고 */
    .next-preview-box {
      background: var(--bg);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .next-preview-box .arrow-icon { color: var(--accent1); font-weight: 700; }

    /* 학부모 전용 */
    .parent-only { display: none; }
    body.parent-mode .parent-only { display: block; }

    /* ── 푸터 ── */
    .footer {
      text-align: center;
      padding: 24px 20px;
      font-size: 11px;
      color: #9ca3af;
    }
    .footer span { color: var(--accent1); font-weight: 600; }
  </style>
</head>
<body>

  <div class="header">
    <h1>MATH</h1>
    <p>수학 과외 수업 기록</p>
  </div>

  <div class="tab-nav" id="tabNav"></div>
  <div id="app"></div>

  <div class="footer">
    Managed by <span>Yoon Dream</span>
  </div>

  <script>
    var IS_PARENT = location.search.indexOf('parent') >= 0;
    if (IS_PARENT) document.body.classList.add('parent-mode');

    var DAY_NAMES = ['일','월','화','수','목','금','토'];
    var DAY_MAP = {'일':0,'월':1,'화':2,'수':3,'목':4,'금':5,'토':6};
    var TODAY = new Date();
    var TODAY_STR = fmtISO(TODAY);
    var calYear = TODAY.getFullYear();
    var calMonth = TODAY.getMonth();
    var DATA = null;

    var HW_LABELS = {
      done:     { text: '완료',     cls: 'done' },
      partial:  { text: '일부 완료', cls: 'partial' },
      wrong:    { text: '오답 있음', cls: 'wrong' },
      not_done: { text: '미완료',   cls: 'not_done' }
    };

    fetch('data.json?v=' + Date.now())
      .then(function(r) { return r.json(); })
      .then(function(d) { DATA = d; init(d); })
      .catch(function() {
        document.getElementById('app').innerHTML =
          '<div style="text-align:center;padding:60px 20px;color:#6b7280">데이터를 불러올 수 없습니다.</div>';
      });

    function init(data) {
      buildTabs(data);
      buildContent(data);
      switchTab('dashboard');
    }

    // ── 탭 ──
    function buildTabs(data) {
      var nav = document.getElementById('tabNav');
      nav.appendChild(mkBtn('대시보드', 'dashboard'));
      data.students.forEach(function(s) { nav.appendChild(mkBtn(s.name, s.id)); });
    }
    function mkBtn(label, id) {
      var btn = document.createElement('button');
      btn.className = 'tab-btn';
      btn.textContent = label;
      btn.dataset.id = id;
      btn.onclick = function() { switchTab(id); };
      return btn;
    }
    function switchTab(id) {
      var btns = document.querySelectorAll('.tab-btn');
      var tabs = document.querySelectorAll('.tab-content');
      for (var i = 0; i < btns.length; i++) {
        btns[i].classList.toggle('active', btns[i].dataset.id === id);
      }
      for (var i = 0; i < tabs.length; i++) {
        tabs[i].classList.toggle('active', tabs[i].id === 'tab-' + id);
      }
    }

    // ── 콘텐츠 ──
    function buildContent(data) {
      var app = document.getElementById('app');
      var dash = document.createElement('div');
      dash.className = 'tab-content';
      dash.id = 'tab-dashboard';
      dash.innerHTML = renderDashboard(data);
      app.appendChild(dash);

      data.students.forEach(function(s) {
        var div = document.createElement('div');
        div.className = 'tab-content';
        div.id = 'tab-' + s.id;
        div.innerHTML = renderStudentTab(s);
        app.appendChild(div);
      });
    }

    // ══════════════════════════════════════
    //  대시보드
    // ══════════════════════════════════════
    function renderDashboard(data) {
      var html = '';
      var plan = data.plan;

      // 전체 세션 수 합산
      var totalHours = 0;
      data.students.forEach(function(s) {
        s.sessions.forEach(function(ss) { totalHours += (ss.hours || 1); });
      });
      var cycleHours = totalHours % plan.total_hours;
      var cycleNum = Math.floor(totalHours / plan.total_hours) + 1;
      var pct = Math.min((cycleHours / plan.total_hours) * 100, 100);
      var months = getMonthsDiff(plan.start_date);

      // 공유 진도 카드
      html += '<div class="section-title">진도 현황</div>';
      html += '<div class="card shared-progress">'
        + '<div class="shared-top">'
        + '<span class="shared-label">진도</span>'
        + '<span class="shared-months">' + months + '개월차</span>'
        + '</div>'
        + '<div class="progress-bar-wrap">'
        + '<div class="progress-bar-fill" style="width:' + pct + '%"></div>'
        + '</div>'
        + '<div class="progress-hours">'
        + '<span class="hours-text">' + cycleHours + ' / ' + plan.total_hours + '시간</span>'
        + '<span class="pct-text">' + Math.round(pct) + '%</span>'
        + '</div>'
        + '<div class="student-counts">';

      data.students.forEach(function(s) {
        var nextInfo = s.next_session ? ' | 다음: ' + fmtShort(new Date(s.next_session)) : '';
        html += '<div class="student-count-item">'
          + '<div class="student-dot" style="background:' + s.color + '"></div>'
          + '<span>' + s.name + ' <strong>' + s.sessions.length + '</strong>회' + nextInfo + '</span>'
          + '</div>';
      });

      html += '</div></div>';

      // 시험 D-day
      var exams = [];
      data.students.forEach(function(s) {
        (s.exams || []).forEach(function(e) {
          exams.push({ name: e.name, date: e.date, student: s.name, color: s.color });
        });
      });
      if (exams.length > 0) {
        html += '<div class="section-title">시험 일정</div>';
        html += '<div class="exam-cards">';
        exams.forEach(function(e) {
          var d = getDday(e.date);
          var txt = d === 0 ? 'D-Day' : (d > 0 ? 'D-' + d : 'D+' + Math.abs(d));
          html += '<div class="exam-chip">'
            + '<span class="exam-dday">' + txt + '</span>'
            + '<div class="exam-info">'
            + '<div class="exam-name">' + e.name + '</div>'
            + '<div>' + e.student + ' | ' + fmtShort(new Date(e.date)) + '</div>'
            + '</div></div>';
        });
        html += '</div>';
      }

      // 캘린더
      html += '<div class="section-title">수업 캘린더</div>';
      html += '<div class="card" id="calendarCard">' + renderCalendar(data) + '</div>';

      return html;
    }

    // ══════════════════════════════════════
    //  캘린더
    // ══════════════════════════════════════
    function renderCalendar(data) {
      var y = calYear, m = calMonth;
      var firstDay = new Date(y, m, 1).getDay();
      var days = new Date(y, m + 1, 0).getDate();

      var html = '<div class="cal-nav">'
        + '<button onclick="calPrev()">&#8249;</button>'
        + '<span class="cal-month">' + y + '년 ' + (m + 1) + '월</span>'
        + '<button onclick="calNext()">&#8250;</button></div>';

      html += '<div class="cal-grid">';
      DAY_NAMES.forEach(function(d) { html += '<div class="cal-header">' + d + '</div>'; });
      for (var i = 0; i < firstDay; i++) html += '<div class="cal-cell"></div>';

      for (var d = 1; d <= days; d++) {
        var ds = y + '-' + pad(m + 1) + '-' + pad(d);
        var dow = new Date(y, m, d).getDay();
        var cls = 'cal-cell';
        if (ds === TODAY_STR) cls += ' today';
        else if (dow === 0) cls += ' sunday';
        else if (dow === 6) cls += ' saturday';

        var dots = '';
        var tags = '';
        data.students.forEach(function(s) {
          var has = false;
          for (var j = 0; j < s.sessions.length; j++) {
            if (s.sessions[j].date === ds) { has = true; break; }
          }
          var isNext = s.next_session && s.next_session === ds;
          if (has) {
            dots += '<div class="cal-dot" style="background:' + s.color + '"></div>';
          }
          if (isNext) {
            tags += '<span class="cal-next-tag" style="background:' + s.color + '">' + s.name.charAt(2) + '</span>';
          }
          // 시험 날짜 체크
          (s.exams || []).forEach(function(e) {
            if (e.date === ds) {
              tags += '<span class="cal-next-tag" style="background:var(--danger)">시험</span>';
            }
          });
        });

        html += '<div class="' + cls + '"><span>' + d + '</span>'
          + (dots ? '<div class="cal-dots">' + dots + '</div>' : '')
          + (tags ? '<div class="cal-next-tags">' + tags + '</div>' : '')
          + '</div>';
      }
      html += '</div>';

      html += '<div class="cal-legend">';
      data.students.forEach(function(s) {
        html += '<div class="cal-legend-item">'
          + '<div class="cal-legend-dot" style="background:' + s.color + '"></div>'
          + '<span>' + s.name + '</span></div>';
      });
      html += '</div>';
      return html;
    }

    function calPrev() { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } document.getElementById('calendarCard').innerHTML = renderCalendar(DATA); }
    function calNext() { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } document.getElementById('calendarCard').innerHTML = renderCalendar(DATA); }

    // ══════════════════════════════════════
    //  학생 탭
    // ══════════════════════════════════════
    function renderStudentTab(student) {
      var html = '<div class="section-title">' + student.name + ' 수업 기록</div>';
      var sorted = student.sessions.slice().sort(function(a, b) { return b.number - a.number; });

      if (sorted.length === 0) {
        html += '<div class="card" style="text-align:center;color:#6b7280;padding:40px">아직 수업 기록이 없습니다.</div>';
        return html;
      }

      sorted.forEach(function(s, i) {
        var isLatest = i === 0;
        html += '<div class="card session-card' + (isLatest ? ' latest open' : '') + '" '
          + 'style="border-left-color:' + (isLatest ? student.color : 'var(--border)') + '">';

        // 헤더
        html += '<div class="session-header" onclick="toggleCard(this)">'
          + '<div class="session-left">'
          + '<span class="session-num">' + s.number + '회차</span>'
          + '<div class="session-meta">'
          + '<div class="session-topic">' + s.topic + '</div>'
          + '<div class="session-date">' + fmtFull(s.date) + '</div>'
          + '</div></div>'
          + '<span class="session-arrow">&#9662;</span></div>';

        // 디테일
        html += '<div class="session-detail">';

        // 수업 내용
        html += '<div class="detail-section">'
          + '<div class="detail-label">수업 내용</div>'
          + '<div class="detail-text">' + s.content + '</div></div>';

        // 피드백 (학부모 전용)
        if (s.feedback) {
          html += '<div class="detail-section parent-only">'
            + '<div class="detail-label">선생님 피드백</div>'
            + '<div class="feedback-box">' + s.feedback + '</div></div>';
        }

        // 숙제
        if (s.homework) {
          var st = s.homework_status || 'not_done';
          var label = HW_LABELS[st] || HW_LABELS.not_done;

          html += '<div class="detail-section">'
            + '<div class="detail-label">숙제</div>'
            + '<div class="homework-header">'
            + '<div class="detail-text">' + s.homework + '</div>'
            + '<span class="homework-badge ' + label.cls + '">' + label.text + '</span>'
            + '</div>';

          if (s.homework_note) {
            html += '<div class="homework-note ' + label.cls + '">' + s.homework_note + '</div>';
          }
          html += '</div>';
        }

        // 이해도 (학부모 전용)
        if (s.understanding) {
          html += '<div class="detail-section parent-only">'
            + '<div class="detail-label">이해도</div>'
            + '<div class="understanding">' + renderStars(s.understanding) + '</div></div>';
        }

        // 다음 수업 예고
        if (s.next_preview) {
          html += '<div class="detail-section">'
            + '<div class="detail-label">다음 수업 예고</div>'
            + '<div class="next-preview-box">'
            + '<span class="arrow-icon">&#10148;</span>'
            + '<span>' + s.next_preview + '</span></div></div>';
        }

        html += '</div></div>';
      });

      return html;
    }

    // ══════════════════════════════════════
    //  유틸리티
    // ══════════════════════════════════════
    function toggleCard(h) { h.parentElement.classList.toggle('open'); }

    function renderStars(n) {
      var h = '';
      for (var i = 1; i <= 5; i++) h += '<span class="star' + (i <= n ? ' filled' : '') + '">&#9733;</span>';
      return h;
    }

    function pad(n) { return n < 10 ? '0' + n : '' + n; }
    function fmtISO(d) { return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()); }
    function fmtFull(s) { var d = new Date(s); return (d.getMonth()+1) + '월 ' + d.getDate() + '일 (' + DAY_NAMES[d.getDay()] + ')'; }
    function fmtShort(d) { if (typeof d === 'string') d = new Date(d); return (d.getMonth()+1) + '/' + d.getDate() + '(' + DAY_NAMES[d.getDay()] + ')'; }

    function getDday(s) {
      var t = new Date(s), n = new Date(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate());
      return Math.ceil((t - n) / 86400000);
    }

    function getMonthsDiff(s) {
      var d = new Date(s);
      return (TODAY.getFullYear() - d.getFullYear()) * 12 + (TODAY.getMonth() - d.getMonth()) + 1;
    }

    function getNextScheduled(days) {
      var d = new Date(TODAY);
      for (var i = 1; i <= 7; i++) {
        d.setDate(d.getDate() + 1);
        var name = DAY_NAMES[d.getDay()];
        for (var j = 0; j < days.length; j++) {
          if (days[j] === name) return new Date(d);
        }
      }
      return null;
    }
  </script>
</body>
</html>
